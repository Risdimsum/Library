spring.application.name=test
server.port=${PORT:8080}

# Database resolution order:
# 1) SPRING_DATASOURCE_*, 2) Railway DATABASE_URL / PG* vars, 3) local fallback
spring.datasource.url=${SPRING_DATASOURCE_URL:${DATABASE_URL:jdbc:postgresql://${PGHOST:localhost}:${PGPORT:5432}/${PGDATABASE:postgres}}}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:${PGUSER:postgres}}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:${PGPASSWORD:}}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.open-in-view=false
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Performance
spring.data.jpa.repositories.bootstrap-mode=${SPRING_DATA_JPA_REPOSITORIES_BOOTSTRAP_MODE:lazy}
spring.main.lazy-initialization=${SPRING_MAIN_LAZY_INITIALIZATION:true}
spring.datasource.hikari.minimum-idle=${SPRING_DATASOURCE_HIKARI_MINIMUM_IDLE:1}
spring.datasource.hikari.maximum-pool-size=${SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE:2}
spring.datasource.hikari.idle-timeout=${SPRING_DATASOURCE_HIKARI_IDLE_TIMEOUT:60000}
spring.datasource.hikari.max-lifetime=${SPRING_DATASOURCE_HIKARI_MAX_LIFETIME:120000}
server.tomcat.threads.max=${SERVER_TOMCAT_THREADS_MAX:5}
server.tomcat.threads.min-spare=${SERVER_TOMCAT_THREADS_MIN_SPARE:1}
spring.jmx.enabled=${SPRING_JMX_ENABLED:false}

# Other
server.error.include-message=always
app.memory-log.enabled=${APP_MEMORY_LOG_ENABLED:false}
