<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/main}">
<head>
    <title>Book Record</title>
    <style layout:fragment="extra-styles">
        .list-card {
            background: #fff;
            border-radius:   16px;
            border: 1px solid #e2e8f0;
            box-shadow: 0 4px 18px rgba(79, 70, 229, 0.08);
            overflow: hidden;
        }

        .list-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            padding: 14px 16px;
            background: #f5f7ff;
            border-bottom: 1px solid #e2e8f0;
        }

        .list-head h4 {
            margin: 0;
            font-size: 1rem;
            font-weight: 800;
            color: #1e1b4b;
        }

        .search-inp {
            width: 240px;
            padding: 8px 10px;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            font-size: 0.88rem;
            background: #fff;
        }
        .search-inp:focus {
            outline: none;
            border-color: #4f46e5;
        }

        .btn-add {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 8px 14px;
            border-radius: 10px;
            text-decoration: none;
            font-size: 0.84rem;
            font-weight: 800;
            color: #fff;
            background: #4f46e5;
        }

        .book-list {
            list-style: none;
            margin: 0;
            padding: 0;
        }

        .book-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            padding: 14px 16px;
            border-bottom: 1px solid #f1f5f9;
        }
        .book-item:last-child {
            border-bottom: none;
        }

        .book-main {
            min-width: 0;
        }
        .book-title {
            margin: 0 0 2px;
            font-size: 0.95rem;
            font-weight: 800;
            color: #1e1b4b;
        }
        .book-sub {
            margin: 0;
            font-size: 0.83rem;
            color: #64748b;
        }

        .book-meta {
            margin-top: 6px;
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            font-size: 0.76rem;
        }
        .meta-pill {
            display: inline-block;
            padding: 3px 8px;
            border-radius: 999px;
            background: #eef2ff;
            color: #3730a3;
            font-weight: 700;
        }

        .book-right {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-shrink: 0;
        }
        .stock {
            font-size: 0.8rem;
            color: #334155;
            font-weight: 700;
            min-width: 76px;
            text-align: right;
        }
        .btn-view {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 7px 12px;
            border-radius: 8px;
            text-decoration: none;
            font-size: 0.78rem;
            font-weight: 800;
            color: #fff;
            background: #4f46e5;
        }

        .empty-st {
            text-align: center;
            padding: 2.4rem 1rem;
            color: #94a3b8;
        }

        @media (max-width: 768px) {
            .list-head {
                flex-direction: column;
                align-items: stretch;
            }
            .search-inp {
                width: 100%;
            }
            .book-item {
                flex-direction: column;
                align-items: flex-start;
            }
            .book-right {
                width: 100%;
                justify-content: space-between;
            }
        }
    </style>
</head>
<body>
<th:block layout:fragment="page-icon">📚</th:block>
<th:block layout:fragment="page-title">Book Record</th:block>

<div layout:fragment="content">
    <div th:if="${successMessage}" class="flash-success">
        <i class="bi bi-check-circle-fill"></i>
        <span th:text="${successMessage}"></span>
    </div>

    <section class="list-card">
        <div class="list-head">
            <h4>Book List</h4>
            <div class="d-flex align-items-center gap-2">
                <form method="get" action="/books" style="margin:0">
                    <input type="text" name="keyword" class="search-inp"
                           placeholder="Search title or author..." th:value="${keyword}">
                </form>
                <a href="/books/add" class="btn-add"><i class="bi bi-plus-lg"></i> Add Book</a>
            </div>
        </div>

        <ul class="book-list" th:if="${!#lists.isEmpty(books)}">
            <li class="book-item" th:each="book : ${books}">
                <div class="book-main">
                    <p class="book-title" th:text="${book.title}">Book Title</p>
                    <p class="book-sub" th:text="${'by ' + book.author}">Author</p>
                    <div class="book-meta">
                        <span class="meta-pill" th:text="${'Branch: ' + (book.branch ?: 'N/A')}"></span>
                        <span class="meta-pill"
                              th:text="${'Price: $' + #numbers.formatDecimal(book.price != null ? book.price : 0, 1, 2)}"></span>
                        <span class="meta-pill"
                              th:text="${'Added by: ' + (book.createdByUser != null ? book.createdByUser.name : 'Unknown')}"></span>
                    </div>
                </div>
                <div class="book-right">
                    <span class="stock"
                          th:text="${(book.availableCopies ?: 0) + '/' + (book.totalCopies ?: 0) + ' available'}">0/0 available</span>
                    <a th:href="@{/books/view/{id}(id=${book.id})}" class="btn-view">
                        <i class="bi bi-eye-fill"></i> View
                    </a>
                </div>
            </li>
        </ul>

        <div th:if="${#lists.isEmpty(books)}" class="empty-st">
            No books found. <a href="/books/add">Add your first book</a>.
        </div>
    </section>
</div>
</body>
</html>
