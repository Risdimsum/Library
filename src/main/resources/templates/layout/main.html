<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<!--
    SHARED LAYOUT
    Place at: src/main/resources/templates/layout/main.html

    Usage in child pages:
        layout:decorate="~{layout/main}"
        <div layout:fragment="content"> ... </div>

    build.gradle dependency:
        implementation 'nz.net.ultraq.thymeleaf:thymeleaf-layout-dialect:3.1.0'
-->
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title layout:title-pattern="$CONTENT_TITLE — Digital Library">Digital Library</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&family=Sora:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <style>
        :root {
            --indigo:      #4f46e5;
            --indigo-dark: #4f46e5;
            --violet:      #4f46e5;
            --cyan:        #4f46e5;
            --teal:        #4f46e5;
            --emerald:     #4f46e5;
            --amber:       #4f46e5;
            --rose:        #4f46e5;
            --bg:          #f0f4ff;
            --sidebar-w:   248px;
        }

        * { box-sizing: border-box; }
        body {
            font-family: 'Nunito', sans-serif;
            background: var(--bg);
            min-height: 100vh;
            display: flex;
        }

        /* ═══════════════════════════════════════════════
           SIDEBAR
        ═══════════════════════════════════════════════ */
        .sidebar {
            width: var(--sidebar-w);
            min-height: 100vh;
            background: var(--indigo);
            position: fixed;
            top: 0; left: 0;
            display: flex;
            flex-direction: column;
            z-index: 100;
            box-shadow: 4px 0 30px rgba(79,70,229,0.25);
            overflow: hidden;
        }

        /* subtle shimmer stripe */
        .sidebar::after {
            content: '';
            position: absolute;
            top: 0; right: 0;
            width: 1px; height: 100%;
            background: rgba(255,255,255,0.15);
        }

        /* Brand */
        .sidebar-brand {
            padding: 1.5rem 1.25rem 1.25rem;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .brand-icon {
            width: 44px; height: 44px;
            background: rgba(255,255,255,0.18);
            border-radius: 14px;
            display: flex; align-items: center; justify-content: center;
            font-size: 20px;
            flex-shrink: 0;
            backdrop-filter: blur(6px);
            border: 1px solid rgba(255,255,255,0.2);
        }

        .brand-text h2 {
            font-family: 'Sora', sans-serif;
            font-size: 1rem; font-weight: 700;
            color: #fff; margin: 0; line-height: 1.2;
        }
        .brand-text small { color: rgba(255,255,255,0.55); font-size: 0.7rem; }

        /* Nav links */
        .nav-item-wrap { padding: 2px 10px; }

        .nav-lnk {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 14px;
            border-radius: 12px;
            color: rgba(255,255,255,0.65);
            font-size: 0.875rem;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.2s;
            position: relative;
        }

        .nav-lnk i { font-size: 1.05rem; width: 22px; text-align: center; flex-shrink: 0; }

        .nav-lnk:hover {
            background: rgba(255,255,255,0.12);
            color: #fff;
            transform: translateX(3px);
        }

        .nav-lnk.active {
            background: rgba(255,255,255,0.18);
            color: #fff;
            font-weight: 700;
            box-shadow: inset 3px 0 0 rgba(255,255,255,0.8);
        }

        /* Color dots on active */
        .nav-lnk.active::after {
            content: '';
            position: absolute;
            right: 12px;
            width: 6px; height: 6px;
            border-radius: 50%;
            background: #fff;
            opacity: 0.7;
        }

        /* Sidebar footer */
        .sidebar-footer {
            margin-top: auto;
            padding: 1rem 10px;
            border-top: 1px solid rgba(255,255,255,0.1);
        }

        .logout-lnk {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 14px;
            border-radius: 12px;
            background: rgba(244,63,94,0.18);
            border: 1px solid rgba(244,63,94,0.3);
            color: #fda4af;
            font-size: 0.875rem;
            font-weight: 700;
            text-decoration: none;
            transition: all 0.2s;
        }
        .logout-lnk:hover {
            background: rgba(244,63,94,0.28);
            color: #fff;
        }

        /* ═══════════════════════════════════════════════
           MAIN CONTENT
        ═══════════════════════════════════════════════ */
        .main-wrapper {
            margin-left: var(--sidebar-w);
            flex: 1;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* Top bar */
        .topbar {
            background: #fff;
            padding: 0 2rem;
            height: 64px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #e2e8f0;
            position: sticky; top: 0; z-index: 50;
            box-shadow: 0 2px 12px rgba(79,70,229,0.07);
        }

        .topbar-left {
            display: flex; align-items: center; gap: 12px;
        }

        .page-badge {
            background: var(--indigo);
            color: #fff;
            width: 32px; height: 32px;
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            font-size: 0.9rem;
            box-shadow: 0 3px 10px rgba(79,70,229,0.3);
        }

        .topbar-title {
            font-family: 'Sora', sans-serif;
            font-size: 1.15rem;
            font-weight: 700;
            color: #1e1b4b;
            margin: 0;
        }

        .topbar-right {
            display: flex; align-items: center; gap: 16px;
        }

        .notif-btn {
            width: 36px; height: 36px;
            border-radius: 10px;
            border: 1.5px solid #e2e8f0;
            background: transparent;
            display: flex; align-items: center; justify-content: center;
            color: #64748b; font-size: 1rem; cursor: pointer;
            transition: all 0.2s; text-decoration: none;
        }
        .notif-btn:hover { border-color: var(--indigo); color: var(--indigo); background: #eff0ff; }

        .user-chip {
            display: flex; align-items: center; gap: 10px;
            background: #f8fafc;
            border: 1.5px solid #e2e8f0;
            border-radius: 50px;
            padding: 5px 14px 5px 5px;
        }

        .user-av {
            width: 30px; height: 30px;
            border-radius: 50%;
            background: var(--indigo);
            display: flex; align-items: center; justify-content: center;
            color: #fff; font-weight: 800; font-size: 0.8rem;
        }

        .user-chip span { font-size: 0.82rem; font-weight: 700; color: #334155; }

        /* Page body */
        .page-body {
            padding: 1.75rem 2rem;
            flex: 1;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* ═══════════════════════════════════════════════
           REUSABLE COMPONENTS (available on all pages)
        ═══════════════════════════════════════════════ */

        /* Flash messages */
        .flash-success {
            background: #eef2ff;
            border: 1.5px solid #c7d2fe;
            border-radius: 14px;
            padding: 12px 18px;
            color: #3730a3;
            font-size: 0.9rem;
            font-weight: 600;
            display: flex; align-items: center; gap: 10px;
            margin-bottom: 1.5rem;
            box-shadow: 0 2px 10px rgba(16,185,129,0.12);
        }

        .flash-error {
            background: #eef2ff;
            border: 1.5px solid #c7d2fe;
            border-radius: 14px;
            padding: 12px 18px;
            color: #3730a3;
            font-size: 0.9rem; font-weight: 600;
            display: flex; align-items: center; gap: 10px;
            margin-bottom: 1.5rem;
        }

        /* Page card */
        .pg-card {
            background: #fff;
            border-radius: 18px;
            padding: 1.75rem;
            box-shadow: 0 4px 24px rgba(79,70,229,0.07);
            border: 1px solid rgba(79,70,229,0.06);
        }
    </style>
    <th:block layout:fragment="extra-styles"></th:block>
</head>
<body>

<!-- ══════════════════ SIDEBAR ══════════════════ -->
<aside class="sidebar">
    <div class="sidebar-brand">
        <div class="brand-icon">📚</div>
        <div class="brand-text">
            <h2>DigiLibrary</h2>
            <small>Paragon IU</small>
        </div>
    </div>

    <div class="nav-item-wrap">
        <a href="/books" class="nav-lnk" th:classappend="${activePage == 'book-record'} ? ' active'">
            <i class="bi bi-collection-fill"></i> Book Record
        </a>
    </div>

    <div class="nav-item-wrap">
        <a href="/issues/new" class="nav-lnk" th:classappend="${activePage == 'issue-book'} ? ' active'">
            <i class="bi bi-book-fill"></i> Issue Book
        </a>
    </div>
    <div class="nav-item-wrap">
        <a href="/issues" class="nav-lnk" th:classappend="${activePage == 'issue-report'} ? ' active'">
            <i class="bi bi-file-earmark-bar-graph-fill"></i> Issue Report
        </a>
    </div>

    <div class="nav-item-wrap">
        <a href="/books/requests" class="nav-lnk" th:classappend="${activePage == 'book-requests'} ? ' active'">
            <i class="bi bi-bell-fill"></i> Book Requests
        </a>
    </div>
    <div class="nav-item-wrap">
        <a href="/students" class="nav-lnk" th:classappend="${activePage == 'student-report'} ? ' active'">
            <i class="bi bi-people-fill"></i> Student Report
        </a>
    </div>

    <div class="sidebar-footer">
        <a href="/logout" class="logout-lnk">
            <i class="bi bi-box-arrow-left"></i> Logout
        </a>
    </div>
</aside>

<!-- ══════════════════ MAIN ══════════════════ -->
<div class="main-wrapper">

    <!-- Topbar -->
    <div class="topbar">
        <div class="topbar-left">
            <div class="page-badge" layout:fragment="page-icon">📄</div>
            <h1 class="topbar-title" layout:fragment="page-title">Dashboard</h1>
        </div>
        <div class="topbar-right">
            <a href="/books" class="notif-btn" title="Books"><i class="bi bi-search"></i></a>
            <div class="user-chip">
                <div class="user-av">A</div>
                <span th:text="${currentUserName ?: 'Guest'}">Guest</span>
            </div>
        </div>
    </div>

    <!-- Content -->
    <div class="page-body">
        <div layout:fragment="content"></div>
    </div>
</div>

<th:block layout:fragment="extra-scripts"></th:block>
</body>
</html>
