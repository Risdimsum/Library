<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/main}">
<head>
    <title>Issue Book</title>
    <style layout:fragment="extra-styles">
        .simple-card {
            max-width: 650px;
            background: #fff;
            border-radius: 16px;
            padding: 1.3rem;
            border: 1px solid #e2e8f0;
            box-shadow: 0 3px 12px rgba(79, 70, 229, 0.08);
        }
        .f-label {
            display: block;
            font-size: 0.78rem;
            font-weight: 700;
            color: #64748b;
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .f-input {
            width: 100%;
            margin-bottom: 10px;
            padding: 10px 12px;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            background: #f8fafc;
            font-size: 0.9rem;
        }
        .f-input:focus { outline: none; border-color: #6366f1; background: #fff; }
        .btn-save {
            border: none;
            border-radius: 10px;
            background: #4f46e5;
            color: #fff;
            padding: 10px 16px;
            font-size: 0.86rem;
            font-weight: 800;
            cursor: pointer;
        }
    </style>
</head>
<body>
<th:block layout:fragment="page-icon">📗</th:block>
<th:block layout:fragment="page-title">Issue Book</th:block>
<th:block layout:fragment="content">
    <div class="simple-card">
        <div th:if="${errorMessage}" class="flash-error">
            <i class="bi bi-exclamation-circle-fill"></i>
            <span th:text="${errorMessage}">Error</span>
        </div>
        <form th:action="@{/issues/new}" th:object="${issueForm}" method="post">
            <label class="f-label" for="userId">Student</label>
            <select id="userId" class="f-input" th:field="*{userId}" th:disabled="${studentLocked}" required>
                <option value="">Select student</option>
                <option th:each="s : ${students}" th:value="${s.id}" th:text="${s.name + ' (' + s.email + ')'}"></option>
            </select>
            <input type="hidden" th:if="${studentLocked}" th:field="*{userId}">

            <label class="f-label" for="bookId">Book</label>
            <select id="bookId" class="f-input" th:field="*{bookId}" required>
                <option value="">Select book</option>
                <option th:each="b : ${books}" th:value="${b.id}" th:text="${b.title + ' — available: ' + b.availableCopies}"></option>
            </select>

            <button type="submit" class="btn-save">Issue Book</button>
        </form>
    </div>
</th:block>
</body>
</html>
